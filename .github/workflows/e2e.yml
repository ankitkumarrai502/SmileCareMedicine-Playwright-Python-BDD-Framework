# E2E pipeline — runs the customer-facing suite against PRODUCTION, then publishes the
# Allure HTML report to GitHub Pages.
#
# Trigger: manual (workflow_dispatch) + weekly schedule. We deliberately do NOT run on every
# push/PR because each run performs real logins against the live shared account.
#
# Credentials come from repo Secrets (never committed): SMILECARE_USER, SMILECARE_PASS,
# SMILECARE_USER_FIRSTNAME.
name: E2E Tests (Production)

on:
  workflow_dispatch:
    inputs:
      markers:
        description: "pytest -m marker expression"
        default: "auth"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write

# allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      tests_passed: ${{ steps.run.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Java (for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium
          npm install -g allure-commandline

      - name: Run suite (headless, production)
        id: run
        continue-on-error: true
        env:
          SMILECARE_ENV: production
          HEADED: "false"
          SMILECARE_USER: ${{ secrets.SMILECARE_USER }}
          SMILECARE_PASS: ${{ secrets.SMILECARE_PASS }}
          SMILECARE_USER_FIRSTNAME: ${{ secrets.SMILECARE_USER_FIRSTNAME }}
        run: pytest -m "${{ github.event.inputs.markers || 'auth' }}" -p no:xdist

      - name: Generate Allure report
        if: always()
        run: allure generate reports/allure-results -o reports/allure-report --clean

      - name: Upload test artifacts (traces / videos / screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            reports/traces
            reports/videos
            reports/screenshots
            metrics
          retention-days: 14

      - name: Configure Pages
        if: always()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Allure report as Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure-report

      - name: Fail the job if tests failed
        if: steps.run.outcome != 'success'
        run: |
          echo "::error::Test run reported failures — see the Allure report on Pages."
          exit 1

  deploy:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
