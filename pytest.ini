[pytest]
minversion = 8.0
testpaths = tests
# make the repo root importable (src/, config/) without an install:
pythonpath = .
# pytest-bdd reads .feature files from here:
bdd_features_base_dir = tests/features

# Allure results dir (generate report with: allure serve reports/allure-results)
addopts =
    -ra
    --strict-markers
    --alluredir=reports/allure-results

markers =
    smoke: fast critical-path checks
    regression: full regression suite
    # --- customer-facing module markers (admin intentionally excluded) ---
    auth: login / signup / session
    home: landing page
    products: catalog, search, filter, product detail
    cart: shopping cart + coupon
    checkout: checkout + payment selection + order creation
    orders: order confirmation
    track_order: public order tracking
    my_orders: authenticated order history
    reviews: customer reviews
    contact: contact form
    # --- behavior markers ---
    needs_auth: requires a logged-in user
    mocks_network: stubs Web3Forms / geo / FX
